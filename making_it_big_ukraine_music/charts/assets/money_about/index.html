<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NUAM — What about money?</title>
  <style>
    :root {
      --bg: #121212;
      --text: #e8e8e8;
      --muted: #9aa0a6;
      --rule: #2a2a2a;
      --accent: #A78BFA;
      --on: #6D28D9;
      --warn: rgba(251,191,36,0.15);
      --bar: #8B5CF6;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      padding: 1rem 1.25rem 2.5rem;
    }
    .money-wrap { max-width: 72rem; margin: 0 auto; }
    .block { margin-bottom: 2.5rem; }
    .block h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .block .subtitle { color: var(--muted); font-size: 0.88rem; margin: 0 0 0.75rem; }
    .chart-host {
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: #141414;
      padding: 0.5rem;
      overflow-x: auto;
    }
    .axis text { fill: var(--muted); font-size: 11px; }
    .axis line, .axis path { stroke: #444; }
    .grid line { stroke: #2a2a2a; }
    .filter-panel {
      max-width: 100%;
      margin: 0 0 0.75rem;
      padding: 0.85rem 1rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #181818;
    }
    .filter-panel h2 {
      margin: 0 0 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .filter-readout {
      font-size: 0.82rem;
      color: #ccc;
      margin-top: 0.35rem;
      line-height: 1.35;
    }
    .listener-dual {
      position: relative;
      height: 36px;
      margin: 0.65rem 0 0.15rem;
    }
    .listener-track-bg {
      position: absolute;
      left: 0;
      right: 0;
      top: 15px;
      height: 5px;
      background: #333;
      border-radius: 3px;
      pointer-events: none;
    }
    .listener-track-active {
      position: absolute;
      top: 15px;
      height: 5px;
      background: var(--on);
      border-radius: 3px;
      pointer-events: none;
    }
    .listener-dual input[type="range"] {
      position: absolute;
      left: 0;
      width: 100%;
      top: 6px;
      height: 24px;
      margin: 0;
      background: none;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .listener-dual input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 2px solid var(--on);
      cursor: pointer;
      pointer-events: auto;
    }
    .listener-dual input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 2px solid var(--on);
      cursor: pointer;
      pointer-events: auto;
    }
    .listener-dual input[type="range"]::-webkit-slider-runnable-track {
      height: 5px;
      background: transparent;
    }
    .listener-dual input[type="range"]::-moz-range-track {
      height: 5px;
      background: transparent;
    }
    .listener-dual #listen-max {
      z-index: 2;
    }
    .listener-dual #listen-min {
      z-index: 1;
    }
    /* ── slider axis ── */
    .slider-axis {
      position: relative;
      height: 28px;
      margin-top: 2px;
    }
    .slider-tick {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateX(-50%);
    }
    .slider-tick .t-bar { width: 2px; height: 5px; background: #FBBF24; border-radius: 1px; }
    .slider-tick .t-lbl { font-size: 10px; color: #A16207; white-space: nowrap; line-height: 1.4; }
    .slider-marker {
      position: absolute;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      transition: left 0.04s linear;
    }
    .slider-marker .m-bar { width: 2px; height: 6px; background: #FBBF24; border-radius: 1px; }
    .slider-marker .m-lbl {
      font-size: 10px; font-weight: 700; color: #FDE68A;
      background: rgba(120,77,0,0.55);
      padding: 0 5px; border-radius: 3px;
      white-space: nowrap; line-height: 1.6;
    }
    .money-tip {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      padding: 0.45rem 0.65rem;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      max-width: 280px;
    }
    .money-tip strong { color: var(--accent); }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 0.6rem; }
    .pin-badge {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.28rem 0.6rem;
      background: rgba(109,40,217,0.18);
      border: 1px solid rgba(139,92,246,0.45);
      border-radius: 6px;
      font-size: 11px;
      color: #C4B5FD;
      margin-bottom: 0.45rem;
      cursor: pointer;
      user-select: none;
      width: fit-content;
    }
    .pin-badge:hover { background: rgba(109,40,217,0.32); }
    .artist-search-wrap {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.7rem;
    }
    #artist-search {
      flex: 1;
      background: #1c1c1c;
      border: 1px solid #363636;
      border-radius: 5px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: var(--font);
      padding: 0.32rem 0.6rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #artist-search:focus { border-color: var(--accent); }
    #artist-search::placeholder { color: #666; }
    #artist-search-hint {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="money-wrap">
    <div class="block" id="hist-block">
      <h2 id="hist-title">Estimated lifetime payouts pile up on the low end</h2>
      <p class="subtitle" id="hist-subtitle"></p>
      <div class="chart-host"><svg id="hist-svg" role="img" aria-labelledby="hist-title"></svg></div>
      <p class="note" id="hist-note"></p>
    </div>
    <div class="block" id="lines-block">
      <h2 id="lines-title">Monthly estimates — slide the peak band, hover a line</h2>
      <p class="subtitle" id="lines-subtitle"></p>
      <div class="filter-panel" id="listener-filter-panel">
        <div class="artist-search-wrap">
          <input type="text" id="artist-search" list="artist-list"
                 autocomplete="off" spellcheck="false"
                 placeholder="Jump to artist…" aria-label="Search artist to jump to their listener range" />
          <datalist id="artist-list"></datalist>
          <span id="artist-search-hint"></span>
        </div>
        <h2>Peak monthly listeners</h2>
        <p class="filter-readout" style="margin-top:0">
          <strong>Peak</strong> = artist’s best month. The highlighted strip is what you’re seeing — widen it to bring more lines back.
        </p>
        <div class="listener-dual" id="listener-dual-wrap">
          <div class="listener-track-bg" aria-hidden="true"></div>
          <div class="listener-track-active" id="listener-track-active" aria-hidden="true"></div>
          <input type="range" id="listen-min" min="0" max="100" value="0" step="1" aria-label="Lower end of peak listener band shown" />
          <input type="range" id="listen-max" min="0" max="100" value="10000" step="1" aria-label="Upper end of peak listener band shown" />
        </div>
        <div class="slider-axis" id="listen-axis" aria-hidden="true"></div>
        <p class="note" id="lines-filter-note" style="margin-top:0.35rem;margin-bottom:0"></p>
        <span id="listen-val-labels" style="display:none" aria-live="polite"></span>
      </div>
      <div id="pin-badge" class="pin-badge" role="button" tabindex="0" aria-label="Pinned line — click to unpin">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="#A78BFA" aria-hidden="true"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h6v6h2v-6h6v-2l-2-2z"/></svg>
        <span id="pin-name"></span><span style="color:#6b7280;margin-left:3px">— click to unpin</span>
      </div>
      <div class="chart-host"><svg id="lines-svg" role="img" aria-labelledby="lines-title"></svg></div>
      <p class="note" id="lines-note"></p>
    </div>
  </div>
  <div id="money-tip" class="money-tip" style="display:none" aria-hidden="true"></div>

  <script src="chart-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
(function () {
  const raw = window.__NUAM_MONEY_ABOUT__;
  if (!raw || !raw.meta) {
    document.body.innerHTML = "<p style='padding:1rem;color:#888'>No money chart data.</p>";
    return;
  }

  const hist = raw.histogram || {};
  const linesPack = raw.lines || {};
  const meta = raw.meta;

  const fmtUsd2 = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 });

  /* —— histogram —— */
  const bars = hist.bars || [];
  const tLog = hist.thresholdLog != null ? +hist.thresholdLog : Math.log1p(300);
  const pct = hist.pctUnderThreshold != null ? +hist.pctUnderThreshold : 0;
  const nArt = hist.artistCount || 0;

  document.getElementById("hist-subtitle").textContent =
    `${nArt.toLocaleString()} artists. X = estimated lifetime payout (USD).`;

  document.getElementById("hist-note").textContent =
    `${pct.toFixed(1)}% of artists sit below $${hist.thresholdUsd || 300} in estimated lifetime earnings. Numbers are rough — real payouts vary by deal.`;

  const W1 = 880;
  const H1 = 340;
  const m1 = { top: 18, right: 20, bottom: 52, left: 52 };
  const i1w = W1 - m1.left - m1.right;
  const i1h = H1 - m1.top - m1.bottom;

  const maxLog = Math.max(tLog + 0.5, +(hist.maxLog || 12), ...bars.map((b) => b.logX1));
  const maxC = d3.max(bars, (d) => d.count) || 1;

  const x1 = d3.scaleLinear().domain([0, maxLog]).nice().range([0, i1w]);
  const y1 = d3.scaleLinear().domain([0, maxC]).nice().range([i1h, 0]);

  const svg1 = d3.select("#hist-svg").attr("viewBox", `0 0 ${W1} ${H1}`).attr("width", W1).attr("height", H1);
  const g1 = svg1.append("g").attr("transform", `translate(${m1.left},${m1.top})`);

  g1.append("rect")
    .attr("x", x1(0))
    .attr("width", Math.max(0, x1(tLog) - x1(0)))
    .attr("y", 0)
    .attr("height", i1h)
    .attr("fill", "var(--warn)")
    .attr("stroke", "rgba(251,191,36,0.45)")
    .attr("stroke-width", 1);

  g1.selectAll("rect.bar")
    .data(bars)
    .join("rect")
    .attr("class", "bar")
    .attr("x", (d) => x1(d.logX0))
    .attr("width", (d) => Math.max(0, x1(d.logX1) - x1(d.logX0) - 0.5))
    .attr("y", (d) => y1(d.count))
    .attr("height", (d) => i1h - y1(d.count))
    .attr("fill", "var(--bar)")
    .attr("opacity", 0.85);

  g1.append("g")
    .attr("class", "axis")
    .attr("transform", `translate(0,${i1h})`)
    .call(
      d3
        .axisBottom(x1)
        .ticks(8)
        .tickFormat((v) => {
          const x = Math.expm1(+v);
          if (x >= 1e6) return `${(x / 1e6).toFixed(1)}M`;
          if (x >= 1e3) return `${Math.round(x / 1e3)}k`;
          return String(Math.round(x));
        })
    );

  g1.append("g").attr("class", "axis").call(d3.axisLeft(y1).ticks(5).tickFormat(d3.format("d")));

  g1.append("text")
    .attr("fill", "#9aa0a6")
    .attr("x", i1w / 2)
    .attr("y", i1h + 40)
    .attr("text-anchor", "middle")
    .style("font-size", "11px")
    .text("Estimated lifetime earnings per artist (USD)");

  g1.append("text")
    .attr("fill", "#9aa0a6")
    .attr("transform", "rotate(-90)")
    .attr("x", -i1h / 2)
    .attr("y", -40)
    .attr("text-anchor", "middle")
    .style("font-size", "11px")
    .text("Artists (count)");

  g1.append("text")
    .attr("fill", "#c77")
    .attr("x", x1(tLog * 0.45))
    .attr("y", y1(maxC * 0.88))
    .attr("text-anchor", "middle")
    .style("font-size", "12px")
    .text(`Below $${hist.thresholdUsd || 300}: ${pct.toFixed(1)}% of artists`);

  /* —— multi-line + peak listener band —— */
  const seriesAll = linesPack.series || [];
  const monthStrs = linesPack.monthExtents || [];
  const lm = linesPack.meta || {};
  const sliderMax = Math.max(100000, +(lm.sliderMaxPeakListeners || 1_500_000));
  const MAX_DRAW_LINES = 100;
  const dataMin = 0;
  const dataMax = sliderMax;

  /* Log-scale slider: N_STEPS integer positions map [0…dataMax] in log space.
     This spreads ~65 % of the slider travel over the 0–10 k listener range
     while still reaching the full max — no extra sliders needed.           */
  const N_STEPS  = 1000;
  const _sLog0   = 0;                            // Math.log1p(0) = 0
  const _sLog1   = Math.log1p(dataMax);
  function sliderToListeners(pos) {
    const t = pos / N_STEPS;
    return Math.round(Math.expm1(_sLog0 + t * (_sLog1 - _sLog0)));
  }
  function listenersToSlider(v) {
    if (_sLog1 <= 0) return 0;
    const t = Math.log1p(Math.max(0, v)) / _sLog1;
    return Math.round(Math.max(0, Math.min(N_STEPS, t * N_STEPS)));
  }

  const listenMinEl = document.getElementById("listen-min");
  const listenMaxEl = document.getElementById("listen-max");
  const listenValLabels = document.getElementById("listen-val-labels");
  const listenTrackActive = document.getElementById("listener-track-active");
  const listenerDualWrap = document.getElementById("listener-dual-wrap");
  const filterNoteEl = document.getElementById("lines-filter-note");
  let _loMarker = null, _hiMarker = null;

  function fmtListen(x) {
    return Math.round(x).toLocaleString();
  }

  function fmtListenShort(x) {
    if (x >= 1e6) return `${+(x / 1e6).toPrecision(2)}M`;
    if (x >= 1e3) return `${+(x / 1e3).toPrecision(2)}k`;
    return `${Math.round(x)}`;
  }

  /* sLo / sHi are slider positions (0–N_STEPS); labels show converted values. */
  function syncListenerTrack(sLo, sHi) {
    const p0 = sLo / N_STEPS;
    const p1 = sHi / N_STEPS;
    const leftPct = 100 * Math.max(0, Math.min(1, p0));
    let widthPct = 100 * Math.max(0, Math.min(1, p1) - Math.min(1, p0));
    if (widthPct === 0) widthPct = 0.6;
    listenTrackActive.style.left = `${leftPct}%`;
    listenTrackActive.style.width = `${widthPct}%`;

    if (_loMarker && _hiMarker) {
      _loMarker.style.left = `${leftPct.toFixed(1)}%`;
      _hiMarker.style.left = `${(leftPct + widthPct).toFixed(1)}%`;
      _loMarker.querySelector(".m-lbl").textContent = fmtListenShort(sliderToListeners(sLo));
      _hiMarker.querySelector(".m-lbl").textContent = fmtListenShort(sliderToListeners(sHi));
    }
  }

  function buildListenAxis() {
    const axEl = document.getElementById("listen-axis");
    if (!axEl) return;
    axEl.innerHTML = "";

    function addTick(sliderPos, lbl, edge) {
      const div = document.createElement("div");
      div.className = "slider-tick";
      div.style.left = `${(sliderPos / N_STEPS * 100).toFixed(1)}%`;
      if (edge === "start") div.style.transform = "translateX(0)";
      else if (edge === "end") div.style.transform = "translateX(-100%)";
      div.innerHTML = `<div class="t-bar"></div><div class="t-lbl">${lbl}</div>`;
      axEl.appendChild(div);
    }

    /* Log-spaced ticks at powers of 10 that fit within dataMax */
    const logTicks = [0, 100, 1000, 10000, 100000, 1000000, 10000000];
    logTicks.forEach((v, i) => {
      if (v > dataMax) return;
      const pos   = listenersToSlider(v);
      const isEnd = i === logTicks.length - 1 || logTicks[i + 1] > dataMax;
      addTick(pos, fmtListenShort(v), i === 0 ? "start" : isEnd ? "end" : null);
    });
    /* Always mark the actual max */
    if (logTicks[logTicks.length - 1] < dataMax) {
      addTick(N_STEPS, fmtListenShort(dataMax), "end");
    }

    _loMarker = document.createElement("div");
    _loMarker.className = "slider-marker";
    _loMarker.innerHTML = `<div class="m-bar"></div><div class="m-lbl">—</div>`;
    axEl.appendChild(_loMarker);

    _hiMarker = document.createElement("div");
    _hiMarker.className = "slider-marker";
    _hiMarker.innerHTML = `<div class="m-bar"></div><div class="m-lbl">—</div>`;
    axEl.appendChild(_hiMarker);
  }

  function initPeakSliders() {
    const DEFAULT_INIT_MAX = 10000;
    listenMinEl.min = listenMaxEl.min = "0";
    listenMinEl.max = listenMaxEl.max = String(N_STEPS);
    listenMinEl.step = listenMaxEl.step = "1";
    listenMinEl.value = "0";
    listenMaxEl.value = String(listenersToSlider(Math.min(dataMax, DEFAULT_INIT_MAX)));
    listenerDualWrap.style.opacity = "1";
    listenMinEl.disabled = false;
    listenMaxEl.disabled = false;
  }

  initPeakSliders();
  buildListenAxis();

  const nExported = seriesAll.length;
  const nMeta = lm.artistSeriesCount != null ? +lm.artistSeriesCount : nExported;
  document.getElementById("lines-subtitle").textContent =
    `Estimated monthly earnings from ${lm.startMonth || "2025-01"}; ${nMeta.toLocaleString()} artists. Drag the handles to pick a listener band, then hover a line.`;

  document.getElementById("lines-note").textContent =
    "When many artists match, only the top earners are drawn. Hover to identify a line.";

  const monthDates = monthStrs.map((s) => new Date(s + "T12:00:00"));
  const bisectMonth = d3.bisector((d) => d.getTime()).center;

  const W2 = 920;
  const H2 = 760;
  const m2 = { top: 16, right: 28, bottom: 48, left: 64 };
  const i2w = W2 - m2.left - m2.right;
  const i2h = H2 - m2.top - m2.bottom;

  const svg2 = d3.select("#lines-svg").attr("viewBox", `0 0 ${W2} ${H2}`).attr("width", W2).attr("height", H2);
  const g2 = svg2.append("g").attr("transform", `translate(${m2.left},${m2.top})`);

  const x2 = d3
    .scaleTime()
    .domain(d3.extent(monthDates))
    .range([0, i2w]);

  let y2 = d3.scaleLinear().domain([0, 1]).range([i2h, 0]);

  const lineGen = d3
    .line()
    .x((d) => x2(new Date(d.month + "T12:00:00")))
    .y((d) => y2(d.usd))
    .curve(d3.curveMonotoneX);

  /* Earnings-based color scales ─────────────────────────────────────────────
     Scales are created once; their domain is recomputed on every redraw to
     span only the currently visible filtered subset (≤ 350 artists).
     This way the full gray/color range always maps to the visible spread,
     making gradation visible no matter how narrow the filter band is.
     Unselected → gray (dark = low earner, bright = high earner in view).
     Selected   → project palette: violet (low) → golden (high).
     Tooltip/axes always show the original dollar values.                    */
  const _grayScale  = d3.scaleSequentialLog().interpolator(d3.interpolateLab("#2e2e2e", "#d8d8d8"));
  const _colorScale = d3.scaleSequentialLog().interpolator(d3.interpolateLab("#6D28D9", "#FBBF24"));
  function _updateColorDomains(vis) {
    const totals  = vis.map((s) => +(s.totalUsd || 0));
    const floor   = Math.max(0.01, d3.min(totals.filter((v) => v > 0)) || 0.01);
    const ceiling = Math.max(floor * 1.001, d3.max(totals) || floor * 2);
    _grayScale.domain([floor, ceiling]);
    _colorScale.domain([floor, ceiling]);
  }
  function grayForLine(s)  { return _grayScale(Math.max(_grayScale.domain()[0], +(s.totalUsd || 0))); }
  function colorForLine(s) { return _colorScale(Math.max(_colorScale.domain()[0], +(s.totalUsd || 0))); }
  const pathsG = g2.append("g").attr("class", "paths");
  const selG   = g2.append("g").attr("class", "sel");
  const gx = g2.append("g").attr("class", "axis").attr("transform", `translate(0,${i2h})`);
  const gy = g2.append("g").attr("class", "axis");

  g2.append("text")
    .attr("fill", "#9aa0a6")
    .attr("x", i2w / 2)
    .attr("y", i2h + 36)
    .attr("text-anchor", "middle")
    .style("font-size", "11px")
    .text("Month");

  g2.append("text")
    .attr("fill", "#9aa0a6")
    .attr("transform", "rotate(-90)")
    .attr("x", -i2h / 2)
    .attr("y", -48)
    .attr("text-anchor", "middle")
    .style("font-size", "11px")
    .text("Estimated payout (USD / month)");

  const tip = d3.select("#money-tip");
  let activeId = null;
  let pinnedId = null;

  const pinBadge   = document.getElementById("pin-badge");
  const pinNameEl  = document.getElementById("pin-name");

  function updatePinBadge(vis) {
    if (pinnedId == null) {
      pinBadge.style.display = "none";
      return;
    }
    const s = (vis || []).find((d) => d.id === pinnedId)
              || seriesAll.find((d) => d.id === pinnedId);
    pinNameEl.textContent = s ? s.name : String(pinnedId);
    pinBadge.style.display = "flex";
  }

  pinBadge.addEventListener("click", () => {
    pinnedId = null;
    updatePinBadge([]);
    const { draw } = computeDraw(false);
    redrawLinesWithVis(draw);
  });
  pinBadge.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") pinBadge.click();
  });

  function clampListenerSliders() {
    let lo = +listenMinEl.value;
    let hi = +listenMaxEl.value;
    if (lo > hi) {
      // pull min down to hi — keep max in place
      listenMinEl.value = String(hi);
      lo = hi;
    }
    // dynamic z-index: give min higher priority when thumbs nearly overlap
    // so the user can always pull min leftward away from max
    const step = +(listenMinEl.step) || 1;
    listenMinEl.style.zIndex = lo >= hi - step * 2 ? 3 : 1;
  }

  /** @returns {{ draw: typeof seriesAll, inBandCount: number, capped: boolean }} */
  function computeDraw(updateUi) {
    clampListenerSliders();
    const sLo = +listenMinEl.value;
    const sHi = +listenMaxEl.value;
    const lo  = sliderToListeners(sLo);
    const hi  = sliderToListeners(sHi);
    const inBand = seriesAll.filter((s) => s.peakListeners >= lo && s.peakListeners <= hi);
    let draw = inBand;
    let capped = false;
    if (draw.length > MAX_DRAW_LINES) {
      draw = draw.slice().sort((a, b) => (+(b.totalUsd || 0)) - (+(a.totalUsd || 0))).slice(0, MAX_DRAW_LINES);
      capped = true;
      /* Always keep the pinned artist visible even if outside top-N earners */
      if (pinnedId != null && !draw.some((s) => s.id === pinnedId)) {
        const pinned = inBand.find((s) => s.id === pinnedId);
        if (pinned) draw = [pinned, ...draw.slice(0, MAX_DRAW_LINES - 1)];
      }
    }
    if (updateUi) {
      listenValLabels.textContent = `Min: ${fmtListen(lo)} · Max: ${fmtListen(hi)}`;
      syncListenerTrack(sLo, sHi);
      if (inBand.length === 0) {
        filterNoteEl.textContent = "Nobody in this peak band.";
      } else if (capped) {
        filterNoteEl.textContent = `${inBand.length.toLocaleString()} match; showing top ${MAX_DRAW_LINES} by estimated payout — narrow the band to see more.`;
      } else {
        filterNoteEl.textContent = `${inBand.length.toLocaleString()} in this band; all drawn.`;
      }
    }
    return { draw, inBandCount: inBand.length, capped };
  }

  function valueAtMonth(pts, tMs) {
    if (!pts.length) return null;
    const ts = pts.map((p) => new Date(p.month + "T12:00:00").getTime());
    const i = d3.bisector((u) => u).center(ts, tMs);
    const j = Math.max(0, Math.min(pts.length - 1, i));
    return pts[j];
  }

  function redrawLinesWithVis(vis) {
    _updateColorDomains(vis);
    const maxY = d3.max(vis, (s) => d3.max(s.points, (p) => p.usd)) || 1;
    y2.domain([0, maxY * 1.06]).nice();

    gx.call(d3.axisBottom(x2).ticks(d3.timeMonth.every(2)).tickFormat(d3.timeFormat("%b %y")));
    gy.call(d3.axisLeft(y2).ticks(6).tickFormat((v) => (v >= 1e6 ? `${v / 1e6}M` : v >= 1e3 ? `${v / 1e3}k` : v)));

    /* effective highlight = hover first, then pin fallback */
    const hId = activeId != null ? activeId : pinnedId;

    const pth = pathsG.selectAll("path.artist-line").data(vis, (d) => d.id);
    pth.exit().remove();
    pth
      .enter()
      .append("path")
      .attr("class", "artist-line")
      .attr("fill", "none")
      .attr("stroke-width", 2)
      .merge(pth)
      .attr("stroke", (d) => {
        /* pinned-but-not-focused keeps its color; everything else is gray */
        if (hId != null && d.id === pinnedId && d.id !== hId) return colorForLine(d);
        return grayForLine(d);
      })
      .attr("d", (d) => lineGen(d.points))
      .style("opacity", (d) => {
        if (hId == null)          return 0.72;  /* no selection — gray visible */
        if (d.id === hId)         return 0;     /* selG renders it */
        if (d.id === pinnedId)    return 0.65;  /* pinned-but-not-focused, colored */
        return 0.28;                             /* others dimmed gray */
      })
      .style("stroke-width", (d) => {
        if (d.id === pinnedId && d.id !== hId) return 2.2;
        return 1.4;
      });

    selG.selectAll("*").remove();
    if (hId != null) {
      const activeS = vis.find(s => s.id === hId);
      if (activeS) {
        const lineColor = colorForLine(activeS);

        /* halo */
        selG.append("path")
          .attr("fill", "none")
          .attr("d", lineGen(activeS.points))
          .attr("stroke", lineColor)
          .attr("stroke-width", 12)
          .attr("stroke-linecap", "round")
          .attr("stroke-linejoin", "round")
          .attr("opacity", 0.18);
        /* main line */
        selG.append("path")
          .attr("fill", "none")
          .attr("d", lineGen(activeS.points))
          .attr("stroke", lineColor)
          .attr("stroke-width", 4.5)
          .attr("stroke-linecap", "round")
          .attr("stroke-linejoin", "round")
          .attr("opacity", 1);

        /* dots + delta labels per month */
        const _pts = activeS.points;
        const _fmtD = (v) => {
          const sign = v >= 0 ? "+" : "−";
          const abs  = Math.abs(v);
          if (abs >= 1e6) return `${sign}$${(abs / 1e6).toFixed(1)}M`;
          if (abs >= 1e3) return `${sign}$${(abs / 1e3).toFixed(abs >= 10000 ? 0 : 1)}k`;
          if (abs >= 10)  return `${sign}$${Math.round(abs)}`;
          return `${sign}$${abs.toFixed(2)}`;
        };
        const _ptData = _pts.map((d, i) => ({
          d,
          cx: x2(new Date(d.month + "T12:00:00")),
          cy: y2(d.usd),
          delta: i === 0 ? null : d.usd - _pts[i - 1].usd,
        }));

        /* dots */
        selG.selectAll("circle.sel-dot")
          .data(_ptData)
          .join("circle")
          .attr("class", "sel-dot")
          .attr("cx", (p) => p.cx)
          .attr("cy", (p) => p.cy)
          .attr("r", 3.5)
          .attr("fill", lineColor)
          .attr("stroke", "#121212")
          .attr("stroke-width", 1);

        /* delta labels — skip first point (no delta), place above/below to avoid line */
        const _labelPts = _ptData.filter((p) => p.delta !== null);
        selG.selectAll("text.sel-delta")
          .data(_labelPts)
          .join("text")
          .attr("class", "sel-delta")
          .attr("x", (p) => p.cx)
          .attr("y", (p) => {
            /* place above when delta positive (line went up), below otherwise */
            const offset = p.delta >= 0 ? -9 : 14;
            return Math.max(4, Math.min(i2h - 4, p.cy + offset));
          })
          .attr("text-anchor", "middle")
          .attr("fill", (p) => p.delta >= 0 ? "#FBBF24" : "#DC2626")
          .style("font-size", "9px")
          .style("font-weight", "700")
          .style("pointer-events", "none")
          .text((p) => _fmtD(p.delta));

        /* Artist name anchored just left of the last data point */
        const _last = _ptData[_ptData.length - 1];
        if (_last) {
          const _nx = _last.cx - 10;
          const _ny = _last.cy < 22 ? _last.cy + 18 : _last.cy - 18;
          /* background stroke for readability over other lines */
          selG.append("text")
            .attr("x", _nx).attr("y", _ny)
            .attr("text-anchor", "end")
            .attr("fill", "#121212")
            .attr("stroke", "#121212")
            .attr("stroke-width", 3.5)
            .attr("stroke-linejoin", "round")
            .style("font-size", "12px")
            .style("font-weight", "700")
            .style("pointer-events", "none")
            .text(activeS.name);
          /* foreground label in line color */
          selG.append("text")
            .attr("x", _nx).attr("y", _ny)
            .attr("text-anchor", "end")
            .attr("fill", lineColor)
            .style("font-size", "12px")
            .style("font-weight", "700")
            .style("pointer-events", "none")
            .text(activeS.name);
        }
      }
    }

    updatePinBadge(vis);
  }

  function redrawLines() {
    const { draw } = computeDraw(true);
    redrawLinesWithVis(draw);
  }

  /* shared helper: find the closest line to pointer (mx, my) at time tM */
  function findClosestLine(vis, mx, my, tM) {
    let best = null, bestD = 1e18;
    for (const s of vis) {
      const pt = valueAtMonth(s.points, tM);
      if (!pt) continue;
      const px = x2(new Date(pt.month + "T12:00:00"));
      const py = y2(pt.usd);
      const dd = (px - mx) ** 2 + (py - my) ** 2;
      if (dd < bestD && dd < 900) { bestD = dd; best = { s, pt, px, py }; }
    }
    if (pinnedId != null && best != null && best.s.id !== pinnedId) {
      const pinSeries = vis.find(s => s.id === pinnedId);
      if (pinSeries) {
        const pinPt = valueAtMonth(pinSeries.points, tM);
        if (pinPt) {
          const ppx = x2(new Date(pinPt.month + "T12:00:00"));
          const ppy = y2(pinPt.usd);
          const pinnedDist = (ppx - mx) ** 2 + (ppy - my) ** 2;
          if (pinnedDist < 900 && bestD > pinnedDist * 0.25) {
            best = { s: pinSeries, pt: pinPt, px: ppx, py: ppy };
          }
        }
      }
    }
    return best;
  }

  const overlay = g2
    .append("rect")
    .attr("width", i2w)
    .attr("height", i2h)
    .attr("fill", "transparent")
    .style("cursor", "crosshair")
    .on("mousemove", function (event) {
      const { draw: vis } = computeDraw(false);
      if (!vis.length) { tip.style("display", "none"); return; }

      const [mx, my] = d3.pointer(event, this);
      const t0 = x2.invert(mx).getTime();
      const mi = bisectMonth(monthDates, t0);
      const tM = monthDates[Math.max(0, Math.min(monthDates.length - 1, mi))].getTime();
      const best = findClosestLine(vis, mx, my, tM);

      if (!best) {
        activeId = null;
        tip.style("display", "none");
        overlay.style("cursor", pinnedId ? "default" : "crosshair");
        redrawLinesWithVis(vis);
        return;
      }

      activeId = best.s.id;
      overlay.style("cursor", "pointer");
      redrawLinesWithVis(vis);

      const mo = d3.timeFormat("%b %Y")(new Date(best.pt.month + "T12:00:00"));
      const pinHint = pinnedId === best.s.id ? " 📌" : "";
      tip
        .style("display", "block")
        .html(
          `<strong>${best.s.name}${pinHint}</strong><br/>${mo}<br/>${fmtUsd2.format(best.pt.usd)} <span style="color:#888">est. / month</span>`
          + (pinnedId !== best.s.id ? `<br/><span style="color:#6b7280;font-size:10px">click to pin</span>` : `<br/><span style="color:#6b7280;font-size:10px">click to unpin</span>`)
        );
      tip.style("left", event.clientX + 14 + "px").style("top", event.clientY + 14 + "px");
    })
    .on("mouseleave", () => {
      activeId = null;
      tip.style("display", "none");
      overlay.style("cursor", "crosshair");
      /* preserve pinnedId — only clear the transient hover highlight */
      const { draw } = computeDraw(false);
      redrawLinesWithVis(draw);
    })
    .on("click", function (event) {
      const { draw: vis } = computeDraw(false);
      if (!vis.length) return;

      const [mx, my] = d3.pointer(event, this);
      const t0 = x2.invert(mx).getTime();
      const mi = bisectMonth(monthDates, t0);
      const tM = monthDates[Math.max(0, Math.min(monthDates.length - 1, mi))].getTime();
      const best = findClosestLine(vis, mx, my, tM);

      if (!best) {
        /* click on empty area → unpin */
        pinnedId = null;
      } else if (pinnedId === best.s.id) {
        /* click pinned line → unpin */
        pinnedId = null;
      } else {
        /* pin this line */
        pinnedId = best.s.id;
      }
      redrawLinesWithVis(vis);
    });

  /* ── proximity-based z-index so the correct thumb is always on top ── */
  listenerDualWrap.addEventListener("mousemove", function (e) {
    const rect = listenerDualWrap.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const pLo  = +listenMinEl.value / N_STEPS;
    const pHi  = +listenMaxEl.value / N_STEPS;
    listenMinEl.style.zIndex = Math.abs(pct - pLo) <= Math.abs(pct - pHi) ? 3 : 1;
  });
  listenerDualWrap.addEventListener("touchmove", function (e) {
    const touch = e.touches[0];
    const rect  = listenerDualWrap.getBoundingClientRect();
    const pct   = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
    const pLo   = +listenMinEl.value / N_STEPS;
    const pHi   = +listenMaxEl.value / N_STEPS;
    listenMinEl.style.zIndex = Math.abs(pct - pLo) <= Math.abs(pct - pHi) ? 3 : 1;
  }, { passive: true });

  function onSliderInput() {
    activeId = null;
    tip.style("display", "none");
    /* clear pin only if the pinned artist falls outside the new band */
    if (pinnedId != null) {
      const lo = sliderToListeners(+listenMinEl.value);
      const hi = sliderToListeners(+listenMaxEl.value);
      const stillVisible = seriesAll.some(
        (s) => s.id === pinnedId && s.peakListeners >= lo && s.peakListeners <= hi
      );
      if (!stillVisible) pinnedId = null;
    }
    redrawLines();
  }
  listenMinEl.addEventListener("input", onSliderInput);
  listenMaxEl.addEventListener("input", onSliderInput);

  /* ── Artist search: live partial-match pin + slider jump ── */
  (function () {
    const searchEl = document.getElementById("artist-search");
    const hintEl   = document.getElementById("artist-search-hint");
    const listEl   = document.getElementById("artist-list");

    /* Populate datalist once (alphabetical) */
    [...seriesAll]
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s.name;
        listEl.appendChild(opt);
      });

    function pinAndJump(artist) {
      const HALF   = 80;  /* tighter window → fewer in-band artists → pinned always visible */
      const centre = listenersToSlider(artist.peakListeners);
      listenMinEl.value = String(Math.max(0, centre - HALF));
      listenMaxEl.value = String(Math.min(N_STEPS, centre + HALF));
      pinnedId  = artist.id;
      activeId  = null;
      redrawLines();
    }

    function bestMatch(text) {
      if (!text) return null;
      const lc = text.toLowerCase();
      return (
        seriesAll.find((s) => s.name.toLowerCase().startsWith(lc)) ||
        seriesAll.find((s) => s.name.toLowerCase().includes(lc))   ||
        null
      );
    }

    /* Live update on every keystroke */
    searchEl.addEventListener("input", () => {
      const name = searchEl.value.trim();
      if (!name) {
        /* Input cleared — unpin and reset hint */
        pinnedId = null;
        activeId = null;
        hintEl.textContent = "";
        redrawLines();
        return;
      }
      const hit = bestMatch(name);
      if (hit) {
        pinAndJump(hit);
        hintEl.textContent = `→ ${hit.name}`;
        hintEl.style.color = "#9aa0a6";
      } else {
        hintEl.textContent = "not found";
        hintEl.style.color = "#DC2626";
      }
    });

    /* Escape clears the search */
    searchEl.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        searchEl.value = "";
        pinnedId = null;
        activeId = null;
        hintEl.textContent = "";
        redrawLines();
      }
    });
  })();

  redrawLines();
})();
  </script>
</body>
</html>
